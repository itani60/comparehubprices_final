<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <script>
      (function redirectMobileDevices() {
        const params = new URLSearchParams(window.location.search);
        const forcedView = params.get('view');
        const prefKey = 'chp_preferred_view';

        try {
          if (forcedView === 'desktop') localStorage.setItem(prefKey, 'desktop');
          if (forcedView === 'mobile') localStorage.setItem(prefKey, 'mobile');
        } catch {
          // ignore storage errors
        }

        let savedView = '';
        try {
          savedView = localStorage.getItem(prefKey) || '';
        } catch {
          savedView = '';
        }
        if (forcedView === 'desktop') return;

        const ua = navigator.userAgent || '';
        const platform = navigator.platform || '';
        const maxTouchPoints = Number(navigator.maxTouchPoints || 0);
        const isIpadOs = platform === 'MacIntel' && maxTouchPoints > 1;
        const isAndroidTablet = /Android/i.test(ua) && !/Mobile/i.test(ua);
        const uaMobileTablet = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(ua);
        const coarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        const shortestViewportEdge = Math.min(window.innerWidth || 0, window.innerHeight || 0);
        const touchTabletViewport = coarsePointer && shortestViewportEdge >= 600 && shortestViewportEdge <= 1280;
        const isMobileOrTablet =
          uaMobileTablet || isIpadOs || isAndroidTablet || touchTabletViewport || savedView === 'mobile';

        // Keep desktop preference only for non-mobile/non-tablet devices.
        if (!isMobileOrTablet && savedView === 'desktop') return;
        if (!isMobileOrTablet) return;
        if (window.location.pathname.endsWith('/mobile.html')) return;

        const path = window.location.pathname;
        const last = path.split('/').pop() || '';
        let basePath = '/';
        if (path.endsWith('/')) {
          basePath = path;
        } else if (last.includes('.')) {
          basePath = path.slice(0, path.lastIndexOf('/') + 1) || '/';
        } else {
          basePath = `${path}/`;
        }

        window.location.replace(`${basePath}mobile.html${window.location.search}${window.location.hash}`);
      })();
    </script>
